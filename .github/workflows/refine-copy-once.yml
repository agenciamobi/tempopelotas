name: Refine portal copy once

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refine-copy:
    if: github.head_ref == 'refine-site-copy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Skip automated follow-up run
        id: guard
        shell: bash
        run: |
          if git log -1 --pretty=%B | grep -q "Refina copys e unifica mensagens do portal"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply editorial revision
        if: steps.guard.outputs.skip != 'true'
        run: python .github/scripts/refine_copy.py

      - name: Commit refined copy
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/page.tsx components/weather-hero.tsx components/site-header.tsx components/home-editorial-dashboard.tsx components/site-footer.tsx components/inmet-alerts-panel.tsx
          git commit -m "Refina copys e unifica mensagens do portal"
          git push origin HEAD:${{ github.head_ref }}
