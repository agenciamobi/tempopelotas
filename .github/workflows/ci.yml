name: Qualidade do front-end

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar, validar tipos e gerar build
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            npm install
            npm run typecheck
            npm run build
          } 2>&1 | tee ci-output.log

      - name: Registrar diagnóstico em caso de falha
        if: steps.validation.outcome == 'failure' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('ci-output.log')
              ? fs.readFileSync('ci-output.log', 'utf8').slice(-12000)
              : 'O processo falhou antes de gerar o arquivo de diagnóstico.';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const shortSha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner,
              repo,
              title: `CI: falha no build ${shortSha}`,
              body: `Diagnóstico automático do commit ${context.sha}.\n\n\`\`\`text\n${output}\n\`\`\``
            });

      - name: Encerrar com falha quando necessário
        if: steps.validation.outcome == 'failure'
        run: exit 1
