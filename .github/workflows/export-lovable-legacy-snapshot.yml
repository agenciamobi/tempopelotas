name: Export Lovable legacy snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/export-lovable-legacy-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Prepare sanitized snapshot
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          mkdir -p snapshot
          rsync -a ./ snapshot/ \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.vercel' \
            --exclude='.diagnostics' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.development' \
            --exclude='.env.production' \
            --exclude='*.tsbuildinfo'
          printf '%s\n' "${SOURCE_SHA}" > snapshot/.source-commit
          printf '%s\n' "main" > snapshot/.source-ref
          find snapshot -type f | sort > snapshot/.source-files.txt

      - name: Upload sanitized snapshot
        uses: actions/upload-artifact@v4
        with:
          name: tempopelotas-legacy-snapshot-main
          path: snapshot/
          if-no-files-found: error
          retention-days: 1
          compression-level: 6
